<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PayZen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    :root { --brand:#0057FF; --accent:#00D4AA; --dark:#0A0F1E; --card:#111827; --border:rgba(255,255,255,.07); --muted:#6B7280; }
    body { font-family:'DM Sans',sans-serif; background:var(--dark); color:#E5E7EB; min-height:100vh; display:flex; align-items:center; }
    h1,h2,h3 { font-family:'Syne',sans-serif; }
    .auth-wrap { width:100%; max-width:440px; margin:auto; padding:20px; }
    .brand-logo { display:flex; align-items:center; gap:12px; margin-bottom:32px; }
    .logo-icon { width:44px; height:44px; border-radius:12px; background:var(--brand); display:flex; align-items:center; justify-content:center; font-size:1.3rem; color:#fff; }
    .brand-name { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; }
    .brand-sub  { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:32px; }
    .form-control { background:rgba(255,255,255,.05); border:1px solid var(--border); color:#E5E7EB; border-radius:10px; padding:11px 14px; }
    .form-control:focus { background:rgba(255,255,255,.08); border-color:var(--brand); box-shadow:0 0 0 3px rgba(0,87,255,.2); color:#E5E7EB; }
    .form-control::placeholder { color:var(--muted); }
    .form-label { font-size:.82rem; font-weight:600; margin-bottom:6px; }
    .btn-primary { background:var(--brand); border:none; border-radius:10px; font-weight:700; padding:12px; font-size:.95rem; width:100%; }
    .btn-primary:hover { background:#0041CC; }
    .alert { border:none; border-radius:12px; font-size:.875rem; }
    .alert-danger  { background:rgba(239,68,68,.15); color:#FCA5A5; }
    .alert-success { background:rgba(34,197,94,.15); color:#86EFAC; }
    .alert-info    { background:rgba(0,212,170,.15); color:var(--accent); }
    .alert-warning { background:rgba(245,158,11,.15); color:#FCD34D; }
    .divider { border-color:var(--border); }
    a { color:var(--brand); }
    .glow { position:fixed; top:-150px; left:-100px; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(0,87,255,.12) 0%, transparent 70%); pointer-events:none; }
    .glow2 { position:fixed; bottom:-100px; right:-100px; width:400px; height:400px; border-radius:50%; background:radial-gradient(circle, rgba(0,212,170,.08) 0%, transparent 70%); pointer-events:none; }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="auth-wrap">
    <div class="brand-logo">
      <div class="logo-icon"><i class="bi bi-lightning-charge-fill"></i></div>
      <div>
        <div class="brand-name">PayZen</div>
        <div class="brand-sub">Your Money, Your Way</div>
      </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} mb-3">
          <i class="bi bi-info-circle me-2"></i>{{ msg }}
        </div>
      {% endfor %}
    {% endwith %}

    <div class="card">
      <h4 class="mb-1">Welcome back 👋</h4>
      <p class="text-muted mb-4" style="font-size:.85rem;">Login to your PayZen wallet</p>

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-primary">Sign In <i class="bi bi-arrow-right ms-1"></i></button>
      </form>

      <hr class="divider my-4"/>
      <p class="text-center" style="font-size:.85rem; color:var(--muted);">
        New user? <a href="{{ url_for('register') }}" class="fw-600">Create an account</a>
      </p>
    </div>

    <p class="text-center mt-4" style="font-size:.72rem; color:var(--muted);">
      Demo Admin: admin@payzen.com / admin123
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
